name: forecast-free

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "forecast_runs.id"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/forecast_github_free/requirements.txt
      - name: Run forecast
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/forecast_github_free/forecast_run.py --run-id "${{ github.event.inputs.run_id }}"
