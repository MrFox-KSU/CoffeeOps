name: forecast-free

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "forecast_runs.id"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/forecast_github_free/requirements.txt

      - name: Check secrets presence (no values)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import os, sys
          ok = True
          for k in ["SUPABASE_URL","SUPABASE_SERVICE_ROLE_KEY"]:
              v = os.environ.get(k)
              print(k, "SET" if v else "MISSING")
              ok = ok and bool(v)
          if not ok:
              sys.exit("Missing required secrets in GitHub Actions.")
          if not os.environ["SUPABASE_URL"].startswith("http"):
              sys.exit("SUPABASE_URL must include https://")
          PY

      - name: Run forecast
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/forecast_github_free/forecast_run.py --run-id "${{ github.event.inputs.run_id }}"
